<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=1080, height=1920" />
        <title>Statement Outro · Portrait 9:16</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Be+Vietnam+Pro:wght@500;700&display=swap"
            rel="stylesheet"
        />
        <style>
            /*
   * frame-statement-outro — closing card in the Bold Poster design system (Dark Theme).
   */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 1080px;
                height: 1920px;
                overflow: hidden;
                background: #020c1a;
            }
            #root {
                position: relative;
                width: 1080px;
                height: 1920px;
                background: #020c1a;
                color: #e8f4fd;
                font-family: "Be Vietnam Pro", sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .sheet {
                position: absolute;
                inset: 0;
                background: #020c1a;
                opacity: 0;
                animation: fade 0.5s ease-out forwards;
            }

            .rule-top {
                width: 0;
                height: 5px;
                background: #5ce1e6;
                margin-bottom: 70px;
                animation: ruleW 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.4s
                    forwards;
            }
            @keyframes ruleW {
                to {
                    width: 360px;
                }
            }

            .cta {
                font-size: 46px;
                font-weight: 500;
                letter-spacing: 2px;
                text-transform: uppercase;
                color: #e8f4fd;
                text-align: center;
                max-width: 860px;
                line-height: 1.25;
                opacity: 0;
                transform: translateY(20px);
                animation: rise 0.7s ease-out 0.7s forwards;
            }

            .channel {
                font-family: "Alfa Slab One", cursive;
                font-size: 150px;
                line-height: 1;
                background: linear-gradient(135deg, #5ce1e6 0%, #38bdf8 50%, #818cf8 100%);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                text-align: center;
                margin: 36px 0 44px;
                max-width: 980px;
                opacity: 0;
                transform: translateY(40px) rotate(-3deg);
                animation: riseTilt 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1s
                    forwards;
            }
            @keyframes riseTilt {
                to {
                    opacity: 1;
                    transform: translateY(0) rotate(-2deg);
                }
            }

            .source {
                font-size: 30px;
                font-weight: 500;
                letter-spacing: 3px;
                text-transform: uppercase;
                color: #7ec8e3;
                text-align: center;
                opacity: 0;
                animation: fade 0.6s ease-out 1.5s forwards;
            }

            .rule-bot {
                width: 0;
                height: 2px;
                background: #2a4a6e;
                margin-top: 70px;
                animation: ruleW2 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.7s
                    forwards;
            }
            @keyframes ruleW2 {
                to {
                    width: 520px;
                }
            }

            /* Bubbles */
            .bubble { position: absolute; border-radius: 50%; pointer-events: none; }
            .bb1 { width: 110px; height: 110px; top: 10%; left: 7%;
                background: radial-gradient(circle at 35% 35%, rgba(92,225,230,0.18), rgba(92,225,230,0.03));
                border: 1.5px solid rgba(92,225,230,0.15);
                box-shadow: 0 0 28px rgba(92,225,230,0.1), inset 0 0 18px rgba(92,225,230,0.05);
                animation: fb1 15s ease-in-out infinite; }
            .bb2 { width: 76px; height: 76px; top: 35%; right: 8%;
                background: radial-gradient(circle at 35% 30%, rgba(56,189,248,0.2), rgba(56,189,248,0.03));
                border: 1.5px solid rgba(56,189,248,0.16);
                box-shadow: 0 0 22px rgba(56,189,248,0.12), inset 0 0 14px rgba(56,189,248,0.05);
                animation: fb2 11s ease-in-out infinite; }
            .bb3 { width: 140px; height: 140px; bottom: 15%; right: 6%;
                background: radial-gradient(circle at 40% 35%, rgba(129,140,248,0.14), rgba(129,140,248,0.02));
                border: 1.5px solid rgba(129,140,248,0.12);
                box-shadow: 0 0 32px rgba(129,140,248,0.09), inset 0 0 20px rgba(129,140,248,0.04);
                animation: fb3 17s ease-in-out infinite; }
            .bb4 { width: 64px; height: 64px; bottom: 30%; left: 5%;
                background: radial-gradient(circle at 38% 32%, rgba(140,82,255,0.2), rgba(140,82,255,0.03));
                border: 1.5px solid rgba(140,82,255,0.14);
                box-shadow: 0 0 18px rgba(140,82,255,0.1), inset 0 0 10px rgba(140,82,255,0.04);
                animation: fb4 9s ease-in-out infinite; }

            @keyframes fb1 { 0%,100%{transform:translate(0,0) scale(1)} 40%{transform:translate(22px,-38px) scale(1.06)} 70%{transform:translate(-16px,-18px) scale(0.94)} }
            @keyframes fb2 { 0%,100%{transform:translate(0,0) scale(1.02)} 35%{transform:translate(-28px,26px) scale(0.92)} 68%{transform:translate(18px,-32px) scale(1.08)} }
            @keyframes fb3 { 0%,100%{transform:translate(0,0) scale(0.96)} 45%{transform:translate(16px,34px) scale(1.1)} 80%{transform:translate(-20px,14px) scale(0.94)} }
            @keyframes fb4 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-26px,-26px) scale(1.07)} }

            @keyframes fade {
                to {
                    opacity: 1;
                }
            }
            @keyframes rise {
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>
    <body>
        <div
            id="root"
            data-composition-id="main"
            data-start="0"
            data-duration="5"
            data-width="1080"
            data-height="1920"
            data-composition-variables='{"cta":"Theo dõi để xem bản tin mới mỗi ngày","channel":"AI Coding","source":"Nguồn: https://aicodingvn.vercel.app/"}'
        >
            <div class="sheet"></div>
            <div class="bubble bb1"></div>
            <div class="bubble bb2"></div>
            <div class="bubble bb3"></div>
            <div class="bubble bb4"></div>
            <div class="rule-top"></div>
            <div class="cta"></div>
            <div class="channel"></div>
            <div class="source"></div>
            <div class="rule-bot"></div>
        </div>
        <script>
            (function () {
                var v =
                    window.__hyperframes &&
                    typeof window.__hyperframes.getVariables === "function"
                        ? window.__hyperframes.getVariables()
                        : {};
                var set = function (sel, text) {
                    var el = document.querySelector(sel);
                    if (el && text != null) el.textContent = String(text);
                };
                set(".cta", v.cta);
                set(".channel", v.channel);
                set(".source", v.source);
            })();
            window.__timelines = window.__timelines || {};
            window.__timelines["main"] = {
                pause: function () {},
                seek: function () {},
                paused: function () {
                    return true;
                },
            };
        </script>
    </body>
</html>
